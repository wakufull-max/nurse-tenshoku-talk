    --bubble-other:#ffffff;
    --bubble-me:#8DE055;
    --ink:#333;
    --time:rgba(255,255,255,.85);
    --pink:#F26B8A;
    --pink-deep:#E14C6E;
    --pink-soft:#FFEBF0;
    --blue:#4A8FE0;
    --blue-soft:#EAF2FC;
    --green:#5FB98A;
    --green-deep:#4CA576;
    --yellow:#FCE38A;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Zen Maru Gothic',sans-serif;background:#5a7d99;color:var(--ink);-webkit-font-smoothing:antialiased;}
  .phone{max-width:440px;margin:0 auto;min-height:100vh;background-image:linear-gradient(180deg,#93bade 0%,#87b0d4 100%);display:flex;flex-direction:column;}

  .lheader{background:#fff;display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid #e5e5e5;position:sticky;top:0;z-index:10;}
  .lheader .back{color:#888;font-size:20px;}
  .lheader .ava{width:38px;height:38px;border-radius:50%;flex-shrink:0;background-image:var(--aya-img);background-size:cover;background-position:center;}
  .lheader .who b{font-size:15px;font-weight:900;color:#333;}
  .lheader .who small{font-size:11px;color:#999;display:block;}
  .lheader .icons{margin-left:auto;color:#aaa;font-size:17px;letter-spacing:8px;}

  .chat{flex:1;padding:16px 12px 60px;display:flex;flex-direction:column;gap:3px;}
  .daydiv{align-self:center;background:rgba(0,0,0,.12);color:#fff;font-size:11px;padding:3px 14px;border-radius:12px;margin:8px 0 12px;}

  .row{display:flex;align-items:flex-end;gap:7px;margin-top:9px;}
  .row.me{justify-content:flex-end;}
  .row .ava-s{width:34px;height:34px;border-radius:50%;flex-shrink:0;background-image:var(--aya-img);background-size:cover;background-position:center;}
  .row .ava-hide{width:34px;flex-shrink:0;}
  .stack{display:flex;flex-direction:column;max-width:76%;}
  .sender{font-size:11px;color:rgba(255,255,255,.9);margin:0 0 3px 4px;}
  .bwrap{display:flex;align-items:flex-end;gap:5px;margin-top:2px;}
  .row.me .bwrap{flex-direction:row-reverse;}

  .bubble{background:var(--bubble-other);border-radius:16px;padding:10px 13px;font-size:14px;line-height:1.7;border-top-left-radius:4px;box-shadow:0 1px 1px rgba(0,0,0,.06);word-break:break-word;}
  .row.me .bubble{background:var(--bubble-me);border-top-left-radius:16px;border-top-right-radius:4px;color:#1c3a12;}
  .row .stack.cont .bubble{border-top-left-radius:16px;}
  .time{font-size:10px;color:var(--time);white-space:nowrap;margin-bottom:2px;}
  .time.read{display:flex;flex-direction:column;align-items:flex-end;line-height:1.3;}

  .bubble .hl{background:linear-gradient(transparent 60%,var(--yellow) 60%);font-weight:700;}
  .bubble .pk{color:var(--pink-deep);font-weight:700;}

  .mini-stats{display:flex;gap:6px;margin-top:8px;}
  .mini-stats .m{flex:1;background:var(--pink-soft);border-radius:12px;text-align:center;padding:7px 2px;}
  .mini-stats .m small{font-size:9px;color:#999;display:block;}
  .mini-stats .m b{font-size:16px;color:var(--pink-deep);font-weight:900;}

  .svc-card{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,.12);max-width:82%;border-top-left-radius:4px;}
  .svc-top{padding:14px 14px 12px;text-align:center;}
  .svc-top.p1{background:var(--pink-soft);}
  .svc-top.p2{background:var(--blue-soft);}
  .svc-rank{display:inline-block;font-size:11px;font-weight:900;color:#fff;padding:2px 12px;border-radius:12px;margin-bottom:8px;}
  .p1 .svc-rank{background:linear-gradient(135deg,#F6B24B,#E88A2E);}
  .p2 .svc-rank{background:linear-gradient(135deg,#9AB0C4,#7C93A8);}
  .svc-name{font-size:20px;font-weight:900;letter-spacing:.02em;}
  .p1 .svc-name{color:var(--pink-deep);}
  .p2 .svc-name{color:var(--blue);}
  .svc-name .tg{font-size:12px;color:#fff;padding:2px 7px;border-radius:5px;margin-left:5px;vertical-align:middle;}
  .p1 .svc-name .tg{background:var(--pink-deep);}
  .p2 .svc-name .tg{background:var(--green-deep);}
  .svc-sub{font-size:10px;color:#999;margin-top:2px;}
  .svc-body{padding:12px 14px 14px;}
  .svc-feat{list-style:none;margin-bottom:10px;}
  .svc-feat li{display:flex;gap:7px;font-size:13px;padding:4px 0;line-height:1.5;}
  .svc-feat li .ck{font-weight:900;flex-shrink:0;}
  .p1 .ck{color:var(--pink);}
  .p2 .ck{color:var(--blue);}
  .svc-stat{display:flex;align-items:center;justify-content:center;gap:7px;border-radius:12px;padding:8px;margin-bottom:11px;}
  .p1 .svc-stat{background:var(--pink-soft);}
  .p2 .svc-stat{background:var(--blue-soft);}
  .svc-stat small{font-size:10px;color:#999;}
  .svc-stat b{font-size:19px;font-weight:900;}
  .p1 .svc-stat b{color:var(--pink-deep);}
  .p2 .svc-stat b{color:var(--blue);}
  .svc-btn{display:block;text-align:center;text-decoration:none;color:#fff;font-weight:900;font-size:14px;padding:12px;border-radius:12px;background:linear-gradient(135deg,var(--green),var(--green-deep));box-shadow:0 4px 10px rgba(76,165,118,.3);}
  .svc-btn.line{background:linear-gradient(135deg,#3ACC5E,#2FB84E);box-shadow:0 4px 10px rgba(58,204,94,.3);}
  .svc-btn:active{transform:translateY(1px);}

  .combo-b{background:linear-gradient(135deg,var(--pink),var(--pink-deep));color:#fff;border-radius:16px;border-top-left-radius:4px;padding:16px 15px;text-align:center;max-width:82%;box-shadow:0 3px 10px rgba(225,76,110,.3);}
  .combo-b h3{font-size:16px;font-weight:900;line-height:1.5;}
  .combo-b .big{display:inline-block;background:#fff;color:var(--pink-deep);font-size:19px;font-weight:900;padding:1px 12px;border-radius:8px;margin:4px 3px;transform:rotate(-2deg);}
  .combo-b p{font-size:12px;margin-top:8px;line-height:1.6;}

  .dual{display:flex;flex-direction:column;gap:8px;max-width:82%;margin-top:2px;}
  .dual a{display:block;text-decoration:none;color:#fff;font-weight:900;font-size:14px;padding:14px;border-radius:14px;text-align:center;box-shadow:0 4px 10px rgba(0,0,0,.15);}
  .dual .d1{background:linear-gradient(135deg,#3ACC5E,#2FB84E);}
  .dual .d2{background:linear-gradient(135deg,var(--green),var(--green-deep));}
  .dual a small{display:block;font-size:10px;font-weight:500;opacity:.9;margin-top:1px;}

  .typing-bubble{background:#fff;border-radius:16px;border-top-left-radius:4px;padding:12px 14px;display:inline-flex;gap:4px;}
  .typing-bubble span{width:7px;height:7px;border-radius:50%;background:#bbb;animation:bl 1.2s infinite;}
  .typing-bubble span:nth-child(2){animation-delay:.2s;}
  .typing-bubble span:nth-child(3){animation-delay:.4s;}
  @keyframes bl{0%,60%,100%{opacity:.3;}30%{opacity:1;}}

  .inputbar{background:#fff;display:flex;align-items:center;gap:10px;padding:9px 14px;border-top:1px solid #eee;position:sticky;bottom:0;z-index:10;}
  .inputbar .plus{color:#aaa;font-size:22px;}
  .inputbar .field{flex:1;background:#f0f0f0;border-radius:18px;padding:8px 14px;font-size:13px;color:#aaa;}
  .inputbar .send{color:#8DE055;font-size:18px;}

  .foot{text-align:center;font-size:9px;color:rgba(255,255,255,.75);padding:14px 20px 22px;line-height:1.6;}

  /* --- reveal animation --- */
  .msg{opacity:0;transform:translateY(14px);transition:opacity .35s ease,transform .35s ease;}
  .msg.show{opacity:1;transform:translateY(0);}
  @media (prefers-reduced-motion:reduce){
    .msg{opacity:1;transform:none;transition:none;}
    .typing-bubble span{animation:none;}
  }
</style>
</head>

function buildTyping(){

// ---- スクロール駆動の逐次表示 ----
let idx=0;          // 次に出すメッセージのindex
let busy=false;     // 「入力中…」演出の処理中フラグ
const reduce=window.matchMedia('(prefers-reduced-motion: reduce)').matches;

// 1メッセージを表示。相手(aya)で typing:true のときだけ「入力中…」を挟む。
// 表示が完了したら done() を呼ぶ（typingありは遅延後、なしは即時）。
function showOne(done){
  if(idx>=script.length){ done && done(false); return; }
  const item=script[idx];
  idx++;

  const needTyping=(item.typing===true) && !reduce;
  const el=buildMessage(item);

  if(needTyping){
    busy=true;
    const typingRow=buildTyping();
    chat.appendChild(typingRow);
    requestAnimationFrame(()=>typingRow.classList.add('show'));
    setTimeout(()=>{
      typingRow.remove();
      chat.appendChild(el);
      requestAnimationFrame(()=>el.classList.add('show'));
      busy=false;
      done && done(true);
    }, 850 + Math.random()*550);
  }else{
    chat.appendChild(el);
    requestAnimationFrame(()=>el.classList.add('show'));
    done && done(true);
  }
}

// 1ステップ進める：メッセージを1件出し、
// 直後が「自分の返信(me)」なら続けてもう1件出す（会話のテンポを自然に）。
function advance(){
  if(busy || idx>=script.length) return;
  showOne(function(shown){
    if(shown && !busy && idx<script.length && script[idx].type==='me'){
      showOne();
    }
  });
}

// 最初の1件（相手からの挨拶）を表示
advance();

// 下端付近までスクロールしたら次のステップを出す
let ticking=false;
function onScroll(){
  if(ticking) return;
  ticking=true;
  requestAnimationFrame(()=>{
    const nearBottom = window.innerHeight + window.scrollY >= document.body.offsetHeight - 140;
    if(nearBottom) advance();
    ticking=false;
  });
}
window.addEventListener('scroll', onScroll, {passive:true});

// 画面が短くてスクロールできない間は、自動で少しずつ流して"会話してる感"を出す
const kick=setInterval(()=>{
  if(idx>=script.length){ clearInterval(kick); return; }
  const scrollable = document.body.scrollHeight > window.innerHeight + 40;
  if(!scrollable && !busy) advance();
}, 1100);
</script>
